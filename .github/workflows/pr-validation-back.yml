# ─────────────────────────────────────────────────────────────────────────────
# PR-gate del BACKEND (DO-3 · pipeline-spec.md FR-P01..P09,P13,P14 · Principio XVI).
#
# Batería de gates M9 sobre PRs que tocan `backend/**` o `contracts/**` (NO front,
# FR-P01 · filtros `paths:`). Todo DETERMINISTA y sin API de LLM (NFR-P03/FR-P15):
# las evals de promptfoo corren en LOCAL sobre el plan, nunca aquí.
#
# Cadena de suministro (transversal):
#   · FR-P13: acciones fijadas por SHA de 40 chars (el tag va en comentario).
#   · FR-P14: `permissions: contents: read` por defecto; ningún job eleva permisos
#     (este workflow no publica nada — eso es DO-4/DO-5).
#   · AC-1/FR-P07a: la spec del pipeline es anterior en git a este .yml (guardián).
# ─────────────────────────────────────────────────────────────────────────────
name: PR · backend

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'contracts/**'
      - '.github/workflows/pr-validation-back.yml'
      - 'scripts/validate-constitution.sh'
      - 'scripts/acceptance-check.sh'

permissions:
  contents: read

concurrency:
  group: pr-back-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Guardián de Constitución + trazabilidad (FR-P07 / FR-P08) ───────────────
  guardian:
    name: Guardián de Constitución + trazabilidad
    runs-on: ubuntu-latest
    timeout-minutes: 10 # NFR-P01
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # historia completa: spec-antes-que-YAML (git log --diff-filter=A)
      - name: Guardián de Constitución (FR-P07)
        run: bash scripts/validate-constitution.sh
      - name: Trazabilidad RF→tarea→test (FR-P08)
        run: bash scripts/acceptance-check.sh

  # ── Guardián-agente (opt-in, FR-009/FR-P21) — SKIPPED sin ANTHROPIC_API_KEY ──
  guardian-agent:
    name: Guardián de Constitución (agente · opt-in)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Guardián-agente (bloquea si aprobado=false; se omite sin la key)
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: |
          npm install -g @anthropic-ai/claude-code@2.1.209 # versión fijada (cadena de suministro, FR-P13)
          bash scripts/constitution-agent-review.sh
      - name: Aviso si está desactivado
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        run: echo "· guardian-agent OMITIDO (sin ANTHROPIC_API_KEY). Guardián determinista sigue activo."

  # ── Code review registrado (FR-010/FR-P22) — stage de certificación (dummy) ──
  code-review-gate:
    name: Code review registrado
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Certificar el paso de code-review
        run: |
          {
            echo "### ✅ Code review gate";
            echo "Paso de revisión de código **certificado** (stage requerido por branch protection, reto §4).";
            echo "Run: \`${{ github.run_id }}\` · PR: \`${{ github.event.pull_request.number }}\`";
          } >> "$GITHUB_STEP_SUMMARY"

  # NOTA (FR-P04): el escaneo de secretos NO vive aquí. Lo cubre el workflow
  # UNIVERSAL `secrets-scan.yml` (todo PR + push a develop/main, sin filtro paths),
  # de modo que también protege PRs de front y pushes directos a ramas protegidas.

  # ── lint + typecheck + test (Vitest con Postgres de servicio) (FR-P02) ──────
  lint-typecheck-test:
    name: lint · typecheck · test (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 10 # NFR-P01: PR-gate < 10 min
    services:
      postgres:
        image: postgres:16-alpine # NFR-P02: misma base que compose/prod
        env:
          POSTGRES_USER: fieldops
          POSTGRES_PASSWORD: fieldops
          POSTGRES_DB: fieldops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fieldops -d fieldops_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://fieldops:fieldops@localhost:5432/fieldops_test
      NODE_ENV: test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: npm # NFR-P01: caché de dependencias
          cache-dependency-path: backend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Prisma generate
        run: npm run prisma:generate
      - name: Migraciones (Postgres de servicio)
        run: npm run prisma:migrate
      - name: Seed (usuarios/órdenes semilla — los tests referencian sus IDs, FK)
        run: npm run seed
      - name: Lint (eslint)
        run: npm run lint
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
      - name: Tests (Vitest · unit + integración + contrato)
        run: npm test

  # ── Contratos: Spectral (lint) + oasdiff (breaking changes) (FR-P03) ────────
  contracts:
    name: Contratos (Spectral + oasdiff)
    runs-on: ubuntu-latest
    timeout-minutes: 10 # NFR-P01
    permissions:
      contents: read
      checks: write # elevación mínima SOLO en este job (FR-P14): spectral-action publica anotaciones
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # base para el diff
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
      # Spectral vía Docker action oficial (011 FR-002): el `npx spectral-cli@6.14.2` crasheaba con
      # ReferenceError ESM en @asyncapi/specs. La action trae un Spectral funcional y usa `.spectral.yaml`.
      - name: Spectral lint (OpenAPI — falla en severidad error)
        uses: stoplightio/spectral-action@6416fd018ae38e60136775066eb3e98172143141 # v0.8.13
        with:
          file_glob: 'contracts/*.yaml'
          spectral_ruleset: .spectral.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: oasdiff — cambios incompatibles vs base (falla si hay breaking no versionado)
        env:
          OASDIFF_VERSION: 1.23.0
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          base="https://github.com/oasdiff/oasdiff/releases/download/v${OASDIFF_VERSION}"
          curl -sSfL "${base}/oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz" -o oasdiff.tgz
          curl -sSfL "${base}/checksums.txt" -o oasdiff_checksums.txt
          # Verifica el SHA256 del asset contra el publicado en el release (cadena de suministro).
          grep " oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz\$" oasdiff_checksums.txt \
            | sed "s#oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz#oasdiff.tgz#" \
            | sha256sum -c -
          tar -xzf oasdiff.tgz oasdiff
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          rc=0
          for f in contracts/*.yaml; do
            if git cat-file -e "origin/${BASE_REF}:$f" 2>/dev/null; then
              git show "origin/${BASE_REF}:$f" > "/tmp/base-$(basename "$f")"
              echo "· oasdiff breaking $f"
              ./oasdiff breaking "/tmp/base-$(basename "$f")" "$f" --fail-on ERR || rc=1
            else
              echo "· $f es nuevo en esta rama (sin base que comparar) — omitido"
            fi
          done
          exit $rc

  # ── Imagen + Trivy (FR-P05): falla ante CRITICAL/HIGH corregibles ───────────
  image-scan:
    name: Imagen backend + Trivy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build imagen backend (etapa runtime — la desplegable)
        run: docker build --target runtime -t fieldops-backend:ci ./backend
      - name: Trivy (vulnerabilidades del sistema operativo y librerías)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: fieldops-backend:ci
          format: table
          exit-code: '1' # falla el check
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true # solo vulnerabilidades con fix disponible (FR-P05: "corregibles")
          vuln-type: 'os,library'
          skip-dirs: 'usr/local/lib/node_modules/npm' # npm del base image; runtime sin npm/npx (011 FR-003a/b)
