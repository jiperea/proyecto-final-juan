# ─────────────────────────────────────────────────────────────────────────────
# CI de RELEASE del BACKEND en `main` (DO-5 · pipeline-spec.md FR-P11).
#
# WHEN se empuja un tag semver `vX.Y.Z` (release desde main) THE pipeline SHALL
# publicar la imagen ghcr.io/<owner>/fieldops-backend:X.Y.Z (semver, sin sufijo) y
# crear un GitHub Release con la dist adjunta.
#
# Cadena de custodia (FR-P09/AC-3): el tag SOLO libera si el commit etiquetado es
# ANCESTRO de `main` (git merge-base --is-ancestor) — así no se puede publicar desde
# un commit que no pasó el PR-gate. Complementa el tag-protection ruleset documentado
# en .github/branch-protection.md. Además el tag DEBE coincidir con package.json.
#
# No-rebuild REAL (FR-P12): imagen construida UNA vez en `ci`, escaneada con Trivy y
# pasada por artifact al push (load, no rebuild). Actions por SHA de 40 chars (FR-P13);
# `contents: read` por defecto; `packages: write` solo en imagen, `contents: write`
# solo en Release (FR-P14). Determinista, sin API de LLM (NFR-P03).
# ─────────────────────────────────────────────────────────────────────────────
name: CI main · backend (release)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+' # semver estricto: vX.Y.Z

permissions:
  contents: read

concurrency:
  group: ci-main-back-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── CI completo + procedencia + build+Trivy de la imagen (una sola vez) ─────
  ci:
    name: CI completo + imagen (build + Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine # NFR-P02
        env:
          POSTGRES_USER: fieldops
          POSTGRES_PASSWORD: fieldops
          POSTGRES_DB: fieldops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fieldops -d fieldops_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://fieldops:fieldops@localhost:5432/fieldops_test
      NODE_ENV: test
      EVIDENCE_ENC_KEY: test-evidence-enc-key-min-32-characters-x # 026: seed exige la clave (guard dev-local; localhost pasa)
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # historia completa para la verificación de ancestría
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Procedencia — el commit del tag debe estar en main (cadena de custodia)
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::El commit $GITHUB_SHA (tag $GITHUB_REF_NAME) NO es ancestro de main:"
            echo "::error::no pasó el PR-gate. Release abortada."
            exit 1
          fi
          echo "· $GITHUB_SHA es ancestro de main ✓"
      - name: Guarda de lockstep — el tag debe coincidir con AMBOS package.json (FR-013b)
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          back=$(node -p "require('./backend/package.json').version")
          front=$(node -p "require('./frontend/package.json').version")
          if [ "$back" != "$tag" ] || [ "$front" != "$tag" ]; then
            echo "::error::Lockstep roto: tag=$tag, backend=$back, frontend=$front. Ambos package.json deben coincidir con el tag (no publica ninguno)."
            exit 1
          fi
          echo "· lockstep OK: tag $tag == backend $back == frontend $front"
      - name: Instalar dependencias
        working-directory: backend
        run: npm ci
      - name: Prisma generate
        working-directory: backend
        run: npm run prisma:generate
      - name: Migraciones (Postgres de servicio)
        working-directory: backend
        run: npm run prisma:migrate
      - name: Seed (usuarios/órdenes semilla — los tests referencian sus IDs, FK) (011 FR-001)
        working-directory: backend
        run: npm run seed
      - name: Lint
        working-directory: backend
        run: npm run lint
      - name: Typecheck
        working-directory: backend
        run: npm run typecheck
      - name: Tests (Vitest · Postgres real)
        working-directory: backend
        run: npm test
      - name: Build (dist de producción)
        working-directory: backend
        run: npm run build
      - name: Subir dist como artifact (auditoría / futuro CD, retención 90 días)
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: fieldops-backend-dist-${{ github.ref_name }}
          path: backend/dist
          retention-days: 90
          if-no-files-found: error
      - name: Build imagen (etapa runtime, la desplegable) — UNA sola vez
        run: docker build --target runtime -t fieldops-backend:rel ./backend
      - name: Trivy sobre la imagen que se publicará (FR-P05, defensa en profundidad)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: fieldops-backend:rel
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          vuln-type: 'os,library'
          skip-dirs: 'usr/local/lib/node_modules/npm' # npm del base image; runtime sin npm/npx (011 FR-003a/b)
      - name: Serializar la imagen para pasarla a los jobs siguientes (no-rebuild)
        run: docker save fieldops-backend:rel | gzip > image.tar.gz
      - name: Subir la imagen como artifact (efímero, entre jobs)
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: fieldops-backend-image-${{ github.ref_name }}
          path: image.tar.gz
          retention-days: 1
          if-no-files-found: error

  # ── Push de la MISMA imagen semver a GHCR (load, no rebuild) (FR-P11 · P14) ─
  publish-image:
    name: Imagen semver → GHCR
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write # elevación mínima SOLO en este job (FR-P14)
    steps:
      - name: Descargar la imagen construida en el job ci
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: fieldops-backend-image-${{ github.ref_name }}
      - name: Cargar la imagen (load, no build — no-rebuild FR-P12)
        run: docker load < <(gunzip -c image.tar.gz)
      - name: Calcular etiquetas (semver inmutable + móvil :latest)
        id: tag
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          image="ghcr.io/${GITHUB_REPOSITORY,,}/fieldops-backend" # ghcr.io/<owner>/<repo>/... (reto §4)
          ref="${image}:${version}"  # semver inmutable (auditoría/rollback)
          moving="${image}:latest"   # móvil (lo rastrea Render prod, FR-P19)
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "moving=$moving" >> "$GITHUB_OUTPUT"
          echo "· imagen: $ref  +  $moving"
      - name: Login en GHCR (GITHUB_TOKEN, sin secretos extra)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Etiquetar y push de la imagen ya probada+escaneada (semver + :latest)
        run: |
          set -euo pipefail
          docker tag fieldops-backend:rel "${{ steps.tag.outputs.ref }}"
          docker tag fieldops-backend:rel "${{ steps.tag.outputs.moving }}"
          docker push "${{ steps.tag.outputs.ref }}"
          docker push "${{ steps.tag.outputs.moving }}"

  # ── GitHub Release con la dist (idempotente) (FR-P11 · FR-P14) ──────────────
  release:
    name: GitHub Release
    needs: [ci, publish-image]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # elevación mínima SOLO en este job (FR-P14): crear el Release
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Descargar la dist del job de CI
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: fieldops-backend-dist-${{ github.ref_name }}
          path: dist
      - name: Empaquetar dist (nombre de asset único por componente — append al Release)
        run: tar -czf "fieldops-backend-${GITHUB_REF_NAME}.tar.gz" -C dist .
      - name: Crear/actualizar Release (softprops, append de asset) (FR-013 / clarify #4)
        uses: softprops/action-gh-release@01570a1f39cb168c169c802c3bceb9e93fb10974 # v2.1.0
        with:
          tag_name: ${{ github.ref_name }}
          name: FieldOps ${{ github.ref_name }}
          files: fieldops-backend-${{ github.ref_name }}.tar.gz
          fail_on_unmatched_files: true
          body: "Imagen backend: `ghcr.io/${{ github.repository }}/fieldops-backend:${{ github.ref_name }}` (semver, no-rebuild — XVI §4)."
