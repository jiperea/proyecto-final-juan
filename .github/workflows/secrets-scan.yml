# ─────────────────────────────────────────────────────────────────────────────
# Escaneo de secretos UNIVERSAL (FR-P04) — transversal a todos los componentes.
#
# Corre en TODO PR (sin filtro `paths:`) y en push a `develop`/`main`, de modo que
# ningún cambio —backend, frontend o transversal— llega a las ramas protegidas sin
# pasar por gitleaks. Cierra la ventana de exposición que dejaría acotar el escaneo
# de secretos a los PR-gate por componente (back en DO-3, front en DO-6).
#
# Determinista y sin API de LLM (NFR-P03). Binario gitleaks por versión fijada +
# verificación de checksum SHA256 del release (cadena de suministro).
# ─────────────────────────────────────────────────────────────────────────────
name: Secretos (universal)

on:
  pull_request:
  push:
    branches: [develop, main]

permissions:
  contents: read

concurrency:
  group: secrets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (todo el repo)
    runs-on: ubuntu-latest
    timeout-minutes: 10 # NFR-P01
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # historia completa para escanear el diff del PR
      - name: gitleaks (CLI OSS, versión + checksum fijados, sin licencia)
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          set -euo pipefail
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -sSfL "${base}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tgz
          curl -sSfL "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o gitleaks_checksums.txt
          # Verifica el SHA256 del asset descargado contra el publicado en el release.
          grep " gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz\$" gitleaks_checksums.txt \
            | sed "s#gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz#gitleaks.tgz#" \
            | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --redact --exit-code 1
