# ─────────────────────────────────────────────────────────────────────────────
# CI de integración del FRONTEND en `develop` (DO-6 · pipeline-spec.md FR-P10).
#
# WHEN push a `develop` que toca frontend/**·contracts/** THE pipeline SHALL correr el
# CI de front y, si pasa, CONSTRUIR y PUBLICAR la imagen
#   ghcr.io/<owner>/fieldops-frontend:<x.y.z>-snapshot.<sha7>  (nginx unprivileged)
# en GHCR, y subir la dist como artifact (retención 90 días).
#
# No-rebuild REAL (FR-P12): imagen construida UNA vez en `ci`, escaneada con Trivy y
# pasada por artifact al job de push (load, no rebuild). Actions por SHA de 40 chars
# (FR-P13); `contents: read` por defecto, `packages: write` SOLO en el job de push
# (FR-P14). Determinista, sin API de LLM (NFR-P03).
# ─────────────────────────────────────────────────────────────────────────────
name: CI develop · frontend

on:
  push:
    branches: [develop]
    paths:
      - 'frontend/**'
      - 'contracts/**'
      - '.github/workflows/ci-develop-front.yml'

permissions:
  contents: read

concurrency:
  group: ci-develop-front-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI front + imagen (build + Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Lint (eslint + stylelint)
        run: npm run lint
      - name: Typecheck (tsc + codegen:check)
        run: npm run typecheck
      - name: Tests (Vitest + axe-core)
        run: npm test
      - name: Build (Vite)
        run: npm run build
      - name: Subir dist como artifact (auditoría / futuro CD, retención 90 días)
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: fieldops-frontend-dist-${{ github.sha }}
          path: frontend/dist
          retention-days: 90
          if-no-files-found: error
      - name: Build imagen (etapa runtime nginx, la desplegable) — UNA sola vez
        working-directory: . # el contexto de build es ./frontend
        run: docker build --target runtime -t fieldops-frontend:ci ./frontend
      - name: Smoke-test de arranque (FR-005 — verifica antes del push a GHCR, no-rebuild)
        run: |
          set -euo pipefail
          docker run -d --name fe-smoke --add-host backend:127.0.0.1 -p 8080:8080 fieldops-frontend:ci
          trap 'docker rm -f fe-smoke >/dev/null 2>&1 || true' EXIT
          # SC-005: el runtime NO corre como root (uid 101) tras el parcheo (FR-001b).
          test "$(docker inspect --format '{{.Config.User}}' fe-smoke)" = "101"
          curl --retry 15 --retry-delay 1 --retry-connrefused -fsS http://localhost:8080/ >/dev/null
          asset=$(docker exec fe-smoke sh -c 'ls /usr/share/nginx/html/assets/*.js 2>/dev/null | head -1 | sed "s#/usr/share/nginx/html##"')
          test -n "$asset"
          curl -fsS "http://localhost:8080${asset}" >/dev/null
          echo "· smoke-test OK: nginx arranca y sirve / + ${asset}"
      - name: Trivy sobre la imagen que se publicará (FR-P05, defensa en profundidad)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: fieldops-frontend:ci
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          vuln-type: 'os,library'
      - name: Serializar la imagen para el job de push (no-rebuild)
        working-directory: .
        run: docker save fieldops-frontend:ci | gzip > image.tar.gz
      - name: Subir la imagen como artifact (efímero, entre jobs)
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: fieldops-frontend-image-${{ github.sha }}
          path: image.tar.gz
          retention-days: 1
          if-no-files-found: error

  publish-image:
    name: Imagen snapshot → GHCR
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write # elevación mínima SOLO en este job (FR-P14)
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Descargar la imagen construida en el job ci
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: fieldops-frontend-image-${{ github.sha }}
      - name: Cargar la imagen (load, no build — no-rebuild FR-P12)
        run: docker load < <(gunzip -c image.tar.gz)
      - name: Calcular etiquetas (inmutable + móvil :develop)
        id: tag
        run: |
          set -euo pipefail
          version=$(node -p "require('./frontend/package.json').version")
          sha7="${GITHUB_SHA::7}"
          image="ghcr.io/${GITHUB_REPOSITORY,,}/fieldops-frontend" # ghcr.io/<owner>/<repo>/... (reto §4)
          ref="${image}:${version}-snapshot.${sha7}" # inmutable (auditoría/rollback)
          moving="${image}:develop"                  # móvil (lo rastrea Render dev, FR-P19)
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "moving=$moving" >> "$GITHUB_OUTPUT"
          echo "· imagen: $ref  +  $moving"
      - name: Login en GHCR (GITHUB_TOKEN)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Etiquetar y push de la imagen ya probada+escaneada (inmutable + :develop)
        run: |
          set -euo pipefail
          docker tag fieldops-frontend:ci "${{ steps.tag.outputs.ref }}"
          docker tag fieldops-frontend:ci "${{ steps.tag.outputs.moving }}"
          docker push "${{ steps.tag.outputs.ref }}"
          docker push "${{ steps.tag.outputs.moving }}"

  # ── CD dev: redeploy en Render consumiendo la imagen :develop (FR-P16) ──────
  deploy-dev:
    name: Deploy dev (Render)
    needs: publish-image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: dev # secretos del entorno dev (FR-P18)
    steps:
      - name: Disparar deploy en Render (frontend dev) — no-rebuild, Render tira de GHCR
        run: |
          set -euo pipefail
          if [ -z "${RENDER_HOOK:-}" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_FRONTEND sin configurar en 'dev' → CD OMITIDO (verde). Pon el secret para activar el deploy."; exit 0
          fi
          curl -fsS -X POST "$RENDER_HOOK" >/dev/null
          echo "· deploy dev frontend disparado (Render redeploya :develop desde GHCR)"
        env:
          RENDER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
      - name: Smoke-test opcional (espera 200 si hay healthcheck configurado) — AC-8
        env:
          HC: ${{ secrets.RENDER_DEV_HEALTHCHECK_URL_FRONT }}
        run: |
          set -uo pipefail
          if [ -z "${HC:-}" ]; then
            echo "· sin RENDER_DEV_HEALTHCHECK_URL_FRONT → smoke-test omitido (verificación manual del 200)"; exit 0
          fi
          echo "· esperando 200 en $HC (redeploy asíncrono de Render)…"
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$HC" || true)
            if [ "$code" = "200" ]; then echo "· healthy (200) en el intento $i ✓"; exit 0; fi
            sleep 10
          done
          echo "::error::el frontend dev no respondió 200 en ~5 min tras el deploy"; exit 1
