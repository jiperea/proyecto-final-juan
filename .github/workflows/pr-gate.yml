# ─────────────────────────────────────────────────────────────────────────────
# PR GATE agregador (feature 013 · pipeline-spec.md Principio XVI).
#
# Un ÚNICO workflow SIN filtro `paths:` → corre en TODO PR y siempre produce su
# check. Detecta qué componente cambió (job `changes`), ejecuta GOBERNANZA (siempre)
# + los jobs del COMPONENTE tocado (skip el resto), y un job final `PR Gate` AGREGA:
# pasa solo si todo lo relevante pasó (skip cuenta como OK; failure/cancelled bloquea).
#
# Por qué: con branch protection clásica, un required check cuyo workflow no se
# dispara por `paths:` queda en "Expected — Waiting for status" y BLOQUEA el merge
# (deadlock visto en 012). `PR Gate` corre siempre → sin deadlock; agrega los jobs
# de componente → calidad preservada (FR-P09/XIII).
#
# Required en branch protection = { PR Gate, gitleaks (todo el repo) }  (FR-005).
# Cadena de suministro: acciones por SHA de 40 chars (FR-P13/AC-6); permisos mínimos
# (FR-P14). API-free (NFR-P03): el guardián-agente es opt-in y se omite sin la key.
# ─────────────────────────────────────────────────────────────────────────────
name: PR Gate

on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detección de cambios por componente (FR-002) ────────────────────────────
  changes:
    name: Detección de cambios
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read # dorny/paths-filter (sin checkout) lee la lista de ficheros vía la API de PR (D-001)
    outputs:
      back: ${{ steps.filter.outputs.back }}
      front: ${{ steps.filter.outputs.front }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            back:
              - 'backend/**'
              - 'contracts/**'
            front:
              - 'frontend/**'
              - 'contracts/**'
            workflows:
              - '.github/workflows/**'
              - 'scripts/validate-constitution.sh'
              - 'scripts/acceptance-check.sh'
    # Fail-safe (FR-002): un PR que toca .github/workflows/** (incl. este fichero) marca
    # `workflows=true` → los `if:` de componente lo tratan como "correr todo". Y si este
    # job FALLA, `changes` está en el needs del agregador (bloquea) y los `if:` de
    # componente usan `needs.changes.result != 'success'` → corren igual (nunca skip por defecto).

  # ── GOBERNANZA (siempre; sin `if:` de componente) — FR-003 ──────────────────
  guardian:
    name: Guardián de Constitución + trazabilidad
    runs-on: ubuntu-latest
    timeout-minutes: 10 # NFR-P01
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # spec-antes-que-YAML (git log --diff-filter=A)
      - name: Guardián de Constitución (FR-P07)
        run: bash scripts/validate-constitution.sh
      - name: Trazabilidad RF→tarea→test (FR-P08)
        run: bash scripts/acceptance-check.sh

  guardian-agent:
    name: Guardián de Constitución (agente · opt-in)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Guardián-agente (bloquea si aprobado=false; se omite sin la key)
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: |
          npm install -g @anthropic-ai/claude-code@2.1.209 # versión fijada (FR-P13)
          bash scripts/constitution-agent-review.sh
      - name: Aviso si está desactivado
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        run: echo "· guardian-agent OMITIDO (sin ANTHROPIC_API_KEY). Guardián determinista sigue activo."

  code-review-gate:
    name: Code review registrado
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Certificar el paso de code-review
        run: |
          {
            echo "### ✅ Code review gate";
            echo "Paso de revisión de código **certificado** (stage requerido por branch protection, reto §4).";
            echo "Run: \`${{ github.run_id }}\` · PR: \`${{ github.event.pull_request.number }}\`";
          } >> "$GITHUB_STEP_SUMMARY"

  # ── COMPONENTE BACK (if: back ∨ contracts ∨ workflows ∨ changes-failed) — FR-003 ──
  back-quality:
    name: lint · typecheck · test (Postgres)
    needs: changes
    if: ${{ !cancelled() && (needs.changes.result != 'success' || needs.changes.outputs.back == 'true' || needs.changes.outputs.workflows == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10 # NFR-P01
    services:
      postgres:
        image: postgres:16-alpine # NFR-P02: misma base que compose/prod
        env:
          POSTGRES_USER: fieldops
          POSTGRES_PASSWORD: fieldops
          POSTGRES_DB: fieldops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fieldops -d fieldops_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://fieldops:fieldops@localhost:5432/fieldops_test
      NODE_ENV: test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Prisma generate
        run: npm run prisma:generate
      - name: Migraciones (Postgres de servicio)
        run: npm run prisma:migrate
      - name: Seed (usuarios/órdenes semilla — los tests referencian sus IDs, FK)
        run: npm run seed
      - name: Lint (eslint)
        run: npm run lint
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
      - name: Tests (Vitest · unit + integración + contrato)
        run: npm test

  back-contracts:
    name: Contratos (Spectral + oasdiff)
    needs: changes
    if: ${{ !cancelled() && (needs.changes.result != 'success' || needs.changes.outputs.back == 'true' || needs.changes.outputs.workflows == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write # elevación mínima SOLO en este job (FR-P14): spectral-action publica anotaciones
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # base para el diff
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
      - name: Spectral lint (OpenAPI — falla en severidad error)
        uses: stoplightio/spectral-action@6416fd018ae38e60136775066eb3e98172143141 # v0.8.13
        with:
          file_glob: 'contracts/*.yaml'
          spectral_ruleset: .spectral.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: oasdiff — cambios incompatibles vs base (falla si hay breaking no versionado)
        env:
          OASDIFF_VERSION: 1.23.0
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          base="https://github.com/oasdiff/oasdiff/releases/download/v${OASDIFF_VERSION}"
          curl -sSfL "${base}/oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz" -o oasdiff.tgz
          curl -sSfL "${base}/checksums.txt" -o oasdiff_checksums.txt
          grep " oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz\$" oasdiff_checksums.txt \
            | sed "s#oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz#oasdiff.tgz#" \
            | sha256sum -c -
          tar -xzf oasdiff.tgz oasdiff
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          rc=0
          for f in contracts/*.yaml; do
            if git cat-file -e "origin/${BASE_REF}:$f" 2>/dev/null; then
              git show "origin/${BASE_REF}:$f" > "/tmp/base-$(basename "$f")"
              echo "· oasdiff breaking $f"
              ./oasdiff breaking "/tmp/base-$(basename "$f")" "$f" --fail-on ERR || rc=1
            else
              echo "· $f es nuevo en esta rama (sin base que comparar) — omitido"
            fi
          done
          exit $rc

  back-image:
    name: Imagen backend + Trivy
    needs: changes
    if: ${{ !cancelled() && (needs.changes.result != 'success' || needs.changes.outputs.back == 'true' || needs.changes.outputs.workflows == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build imagen backend (etapa runtime — la desplegable)
        run: docker build --target runtime -t fieldops-backend:ci ./backend
      - name: Trivy (vulnerabilidades del sistema operativo y librerías)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: fieldops-backend:ci
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          vuln-type: 'os,library'
          skip-dirs: 'usr/local/lib/node_modules/npm' # npm del base image; runtime sin npm/npx (011 FR-003a/b)

  # ── COMPONENTE FRONT (if: front ∨ contracts ∨ workflows ∨ changes-failed) — FR-003 ──
  front-quality:
    name: lint · typecheck · test · build
    needs: changes
    if: ${{ !cancelled() && (needs.changes.result != 'success' || needs.changes.outputs.front == 'true' || needs.changes.outputs.workflows == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Lint (eslint + stylelint)
        run: npm run lint
      - name: Typecheck (tsc + codegen:check — aserción Zod↔contrato)
        run: npm run typecheck
      - name: Tests (Vitest + axe-core)
        run: npm test
      - name: Build (Vite)
        run: npm run build

  front-image:
    name: Imagen frontend + Trivy
    needs: changes
    if: ${{ !cancelled() && (needs.changes.result != 'success' || needs.changes.outputs.front == 'true' || needs.changes.outputs.workflows == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build imagen frontend (etapa runtime nginx, la desplegable)
        run: docker build --target runtime -t fieldops-frontend:ci ./frontend
      - name: Smoke-test de arranque (012 FR-005 — nginx arranca y sirve estáticos)
        run: |
          set -euo pipefail
          docker run -d --name fe-smoke --add-host backend:127.0.0.1 -p 8080:8080 fieldops-frontend:ci
          trap 'docker rm -f fe-smoke >/dev/null 2>&1 || true' EXIT
          test "$(docker inspect --format '{{.Config.User}}' fe-smoke)" = "101" # no-root (012 SC-005)
          curl --retry 15 --retry-delay 1 --retry-connrefused -fsS http://localhost:8080/ >/dev/null
          asset=$(docker exec fe-smoke sh -c 'ls /usr/share/nginx/html/assets/*.js 2>/dev/null | head -1 | sed "s#/usr/share/nginx/html##"')
          test -n "$asset"
          curl -fsS "http://localhost:8080${asset}" >/dev/null
          echo "· smoke-test OK: nginx arranca y sirve / + ${asset}"
      - name: Trivy (vulnerabilidades del sistema operativo y librerías)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: fieldops-frontend:ci
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          vuln-type: 'os,library'

  # ── Self-check: el `needs` de PR Gate cubre TODOS los jobs (FR-004/SC-006) ──
  gate-selfcheck:
    name: Gate self-check (needs completo)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: El needs de 'pr-gate' incluye todos los jobs (sin bypass silencioso)
        run: |
          set -euo pipefail
          f=.github/workflows/pr-gate.yml
          # IDs de job (indentación de 2 espacios bajo `jobs:`)
          ids=$(awk '/^jobs:/{j=1;next} j && /^  [A-Za-z0-9_-]+:/{s=$1; sub(/:.*/,"",s); print s}' "$f")
          # La línea `needs:` del agregador es la ÚNICA escrita como array inline `[ ... ]`.
          needline=$(grep -E '^    needs: \[' "$f" | head -1)
          [ -n "$needline" ] || { echo "::error::no encuentro el needs array de pr-gate"; exit 1; }
          # Comparación de conjuntos (robusta, sin loops ni here-doc frágil en YAML):
          expected=$(printf '%s\n' "$ids" | grep -v '^pr-gate$' | sort -u)
          got=$(printf '%s\n' "$needline" | grep -oE '[A-Za-z0-9_-]+' | grep -v '^needs$' | sort -u)
          missing=$(comm -23 <(printf '%s\n' "$expected") <(printf '%s\n' "$got"))
          if [ -n "$missing" ]; then
            echo "::error::jobs fuera del needs de 'PR Gate' (bypass silencioso):"; echo "$missing"; exit 1
          fi
          echo "· needs de PR Gate cubre todos los jobs"

  # ── AGREGADOR: el ÚNICO required (con gitleaks). Agrega todos los needs (FR-004) ──
  pr-gate:
    name: PR Gate
    needs: [changes, guardian, guardian-agent, code-review-gate, back-quality, back-contracts, back-image, front-quality, front-image, gate-selfcheck]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Agregar resultados (falla si algún job requerido falló o fue cancelado)
        run: |
          set -euo pipefail
          results='${{ join(needs.*.result, ',') }}'
          echo "· resultados de los needs: $results"
          bad=0
          IFS=','
          for r in $results; do
            case "$r" in
              failure|cancelled) echo "::error::PR Gate: un job requerido terminó en '$r'"; bad=1 ;;
              success|skipped) ;;
              *) echo "::error::PR Gate: resultado inesperado '$r'"; bad=1 ;;
            esac
          done
          [ "$bad" = 0 ] && echo "· PR Gate OK — todo lo relevante pasó (skip = OK)"
          exit "$bad"
