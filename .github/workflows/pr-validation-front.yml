# ─────────────────────────────────────────────────────────────────────────────
# PR-gate del FRONTEND (DO-6 · pipeline-spec.md FR-P06,P07,P08,P01,P13,P14).
#
# Batería de gates sobre PRs que tocan `frontend/**` o `contracts/**` (NO back,
# FR-P01 · filtros `paths:`). El contrato entra por `contracts/**` porque el front
# deriva sus tipos del contrato (codegen + aserción Zod↔contrato en `typecheck`).
# Determinista y sin API de LLM (NFR-P03); el escaneo de secretos lo cubre el
# workflow universal `secrets-scan.yml` (FR-P04).
# ─────────────────────────────────────────────────────────────────────────────
name: PR · frontend

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'contracts/**'
      - '.github/workflows/pr-validation-front.yml'
      - 'scripts/validate-constitution.sh' # un cambio al guardián re-dispara el gate (paridad con back)
      - 'scripts/acceptance-check.sh'

permissions:
  contents: read

concurrency:
  group: pr-front-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Guardián de Constitución + trazabilidad (FR-P07 / FR-P08) ───────────────
  guardian:
    name: Guardián de Constitución + trazabilidad
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # spec-antes-que-YAML (git log --diff-filter=A)
      - name: Guardián de Constitución (FR-P07)
        run: bash scripts/validate-constitution.sh
      - name: Trazabilidad RF→tarea→test (FR-P08)
        run: bash scripts/acceptance-check.sh

  # ── lint + typecheck(+codegen) + test(+axe) + build (FR-P06) ────────────────
  lint-typecheck-test-build:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 10 # NFR-P01
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Lint (eslint + stylelint)
        run: npm run lint
      - name: Typecheck (tsc + codegen:check — aserción Zod↔contrato)
        run: npm run typecheck
      - name: Tests (Vitest + axe-core)
        run: npm test
      - name: Build (Vite)
        run: npm run build
      # NOTA: los E2E (Playwright, `test:e2e`) NO corren en el PR-gate: son pesados
      # (navegadores) y arriesgan el NFR-P01 (<10 min). Se ejecutan en local/manual
      # con justificación (regla del proyecto sobre E2E).

  # ── Imagen front + Trivy (paridad con el PR-gate de back, FR-P05) ───────────
  # El Dockerfile de front (base nginx) también debe pasar el gate de cadena de
  # suministro ANTES del merge a develop, no solo en el CI de develop (D-001 DO-6).
  image-scan:
    name: Imagen frontend + Trivy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build imagen frontend (etapa runtime nginx, la desplegable)
        run: docker build --target runtime -t fieldops-frontend:ci ./frontend
      - name: Trivy (vulnerabilidades del sistema operativo y librerías)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: fieldops-frontend:ci
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          vuln-type: 'os,library'
