# Sirve la SPA (fallback a index.html para rutas de cliente) y proxya /v1 → backend (mismo origen).
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API: mismo origen para el navegador; nginx reenvía al servicio backend del compose.
  location /v1/ {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Rutas de cliente (React Router): cualquier ruta desconocida → index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
