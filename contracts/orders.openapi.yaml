openapi: 3.1.0
info:
  title: FieldOps â€” Orders API
  version: 1.3.0
  description: >
    Feature 002a (read-side): listado de Ăłrdenes filtrado por rol sobre el auth/RBAC de 001.
    Feature 004 (write-side): reasignaciĂłn de una orden por el dispatcher (POST .../reassignments),
    primer endpoint que muta una orden (conserva estado, version+1, auditorĂ­a append-only atĂłmica).
    Feature 005 (write-side): registro de ejecuciĂłn por el tĂ©cnico â€” startOrderWork (POST .../start,
    assignedâ†’in_progress) y submitOrderExecution (POST .../execution, in_progressâ†’pending_review con
    â‰Ą1 evidencia por referencia + notas).
    Feature 006 (write-side): revisiĂłn por el supervisor â€” reviewOrder (POST .../review): approve
    (pending_reviewâ†’closed, guard â‰Ą1 evidencia â†’ 409) o reject (pending_reviewâ†’in_progress con motivo).
    Contract-first (Constitution II). Nombres externos snake_case; internos camelCase.
    Reutiliza bearerAuth y ErrorResponse de contracts/auth.openapi.yaml (001).
servers:
  - url: /v1
tags:
  - name: orders
    description: Ă“rdenes de trabajo (listado + reasignaciĂłn + registro de ejecuciĂłn)

paths:
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: Listar las Ăłrdenes visibles segĂşn el rol del usuario autenticado
      description: >
        Devuelve las Ăłrdenes filtradas por la polĂ­tica de alcance del rol (orderScopeFor):
        technician = propias activas (assigned/in_progress/pending_review); supervisor = pending_review;
        dispatcher = assigned/in_progress. `draft` y `closed` nunca aparecen. Orden created_at desc, id desc.
        Sin paginaciĂłn. NingĂşn parĂˇmetro de consulta amplĂ­a el alcance (se ignoran). Orden 401â†’403.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista (posiblemente vacĂ­a) de las Ăłrdenes del alcance del rol.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderListResponse' }
        '401':
          description: No autenticado (sin access vĂˇlido / sesiĂłn revocada / cuenta disabled). Uniforme.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '403':
          description: Rol fuera del allowlist de `orders:list` (default-deny, fail-secure).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '503':
          description: BD no disponible (fail-closed; nunca cuelga ni fail-open). ConvenciĂłn transversal (001).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

  /orders/{orderId}/reassignments:
    post:
      operationId: reassignOrder
      tags: [orders]
      summary: Reasignar una orden reasignable a otro tĂ©cnico (sĂłlo dispatcher)
      description: >
        Un dispatcher reasigna una orden reasignable (status assigned/in_progress) a un tĂ©cnico destino vĂˇlido,
        conservando el status, con version+1 y auditorĂ­a append-only en la misma transacciĂłn.
        No-enumeraciĂłn: una Ăşnica consulta de visibilidad decide 404 (inexistente o no reasignable, cuerpo
        genĂ©rico idĂ©ntico). Orden 401â†’403â†’404â†’422. Actor derivado server-side del token (nunca del cuerpo).
        MVP sin concurrencia optimista explĂ­cita (If-Match/409 = stretch, fuera de alcance).
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReassignmentRequest' }
      responses:
        '200':
          description: ReasignaciĂłn aplicada. Orden actualizada (nuevo assigned_to, version+1).
          content:
            application/json: { schema: { $ref: '#/components/schemas/Order' } }
        '401':
          description: No autenticado (sin access vĂˇlido / sesiĂłn revocada / cuenta disabled). Uniforme.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '403':
          description: Autenticado pero el rol no es dispatcher (FORBIDDEN_ROLE, default-deny). Sin efecto.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '404':
          description: >
            Orden inexistente, no visible/no reasignable, u orderId malformado (no-uuid). Cuerpo genĂ©rico e
            indistinguible entre las causas (no-enumeraciĂłn).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '422':
          description: >
            INVALID_ASSIGNEE (destino inexistente / no-technician / deshabilitado / igual al actual â€” cuerpo
            genĂ©rico idĂ©ntico para las 4 causas) o VALIDATION_ERROR (reason ausente/vacĂ­o/sĂłlo whitespace o
            control / >500 code points, o cuerpo mal formado). Sin efecto.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '500':
          description: >
            Error interno genĂ©rico. Cubre TODO error de base de datos (deadlock, timeout, BD no disponible,
            constraint), conforme a FR-009. Cuerpo genĂ©rico; nunca filtra detalle de Postgres (SQLSTATE,
            constraint, columna, query).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

  # ---- Feature 005 â€” registro de ejecuciĂłn por el tĂ©cnico ----
  /orders/{orderId}/start:
    post:
      operationId: startOrderWork
      tags: [orders]
      summary: Iniciar el trabajo de una orden propia (sĂłlo technician)
      description: >
        Un technician inicia su orden en estado `assigned` (assignedâ†’in_progress), con version+1 y auditorĂ­a
        append-only atĂłmica (reason NULL). Sin cuerpo. Precedencia Ăşnica 401â†’403â†’404(pertenencia)â†’422(estado).
        Actor derivado del token server-side. Pertenencia (assigned_to == actor) antes que estado: orden ajena en
        cualquier estado â†’ 404 genĂ©rico. Se aplica vĂ­a el mĂłdulo write-side propio de 005 (start-order-work.ts +
        classify-execution-guard.ts); NO reutiliza applyTransition/classifyZeroRows de 002b para clasificar.
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Trabajo iniciado. Orden actualizada (status in_progress, version+1).
          content:
            application/json: { schema: { $ref: '#/components/schemas/Order' } }
        '401':
          description: No autenticado. Uniforme (001).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '403':
          description: Autenticado pero el rol no es technician (FORBIDDEN_ROLE, default-deny). Sin efecto.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '404':
          description: >
            Orden inexistente, ajena (assigned_to != actor) u orderId malformado. Cuerpo genĂ©rico indistinguible
            (no-enumeraciĂłn), incluso si la orden ajena estĂˇ en estado no operable.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '422':
          description: >
            Orden PROPIA pero en estado de origen no legal para iniciar (ya in_progress/pending_review/closed):
            INVALID_TRANSITION. Sin efecto.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '500':
          description: Error interno genĂ©rico (todo error de BD). Cuerpo genĂ©rico; nunca filtra detalle de Postgres.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

  /orders/{orderId}/execution:
    post:
      operationId: submitOrderExecution
      tags: [orders]
      summary: Registrar la ejecuciĂłn con evidencia y notas (sĂłlo technician)
      description: >
        Un technician registra la ejecuciĂłn de su orden en estado `in_progress` (in_progressâ†’pending_review),
        adjuntando â‰Ą1 evidencia vĂˇlida (por referencia) y notas. En UNA sola transacciĂłn: transiciĂłn, version+1,
        auditorĂ­a (reason = marcador opaco, sin las notas), evidencia(s) append-only y notas en tabla aparte
        (OrderExecutionNotes, payload PII). Todo o nada, en orden transiciĂłnâ†’auditorĂ­aâ†’evidenciaâ†’notas.
        Precedencia Ăşnica PAYLOAD PRIMERO: 401â†’403â†’422(payload)â†’404(pertenencia)â†’422(estado); dentro del payload,
        evidencia antes que notas. Orden ajena con payload vĂˇlido â†’ 404; con payload invĂˇlido â†’ 422 (el 422 de
        payload no es correlacionable con el recurso destino). Actor server-side. Sin If-Match/409 (=#008).
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExecutionRequest' }
      responses:
        '200':
          description: EjecuciĂłn registrada. Orden actualizada (status pending_review, version+1).
          content:
            application/json: { schema: { $ref: '#/components/schemas/Order' } }
        '401':
          description: No autenticado. Uniforme (001).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '403':
          description: Rol no technician (FORBIDDEN_ROLE). Sin efecto.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '404':
          description: >
            Orden inexistente, ajena u orderId malformado. Cuerpo genĂ©rico indistinguible (no-enumeraciĂłn),
            incluso si la orden ajena estĂˇ en estado no operable.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '422':
          description: >
            Orden propia en estado no legal (INVALID_TRANSITION); o evidencia invĂˇlida: EVIDENCE_REQUIRED
            (0 elementos) / INVALID_EVIDENCE (content_type fuera de allowlist, size_bytes fuera de rango,
            object_ref con formato invĂˇlido, duplicados, o array > mĂˇximo); o notas invĂˇlidas (VALIDATION_ERROR:
            ausentes/vacĂ­as/whitespace/>mĂˇx). La evidencia se valida antes que las notas. Sin efecto.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '500':
          description: Error interno genĂ©rico (todo error de BD). Cuerpo genĂ©rico; nunca filtra detalle de Postgres.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

  /orders/{orderId}/review:
    post:
      operationId: reviewOrder
      tags: [orders]
      summary: Aprobar o rechazar una orden en pending_review (sĂłlo supervisor)
      description: >
        Un supervisor decide sobre una orden en `pending_review`: approve (pending_reviewâ†’closed) o reject
        (pending_reviewâ†’in_progress con motivo obligatorio). En UNA transacciĂłn: transiciĂłn, version+1 y
        auditorĂ­a append-only (OrderAudit.reason = motivo pre-saneado, nunca en logs/errores). La aprobaciĂłn
        aplica un guard defensivo: la orden debe conservar â‰Ą1 evidencia (invariante de 005) o 409
        EVIDENCE_REQUIRED. Evidencia y notas de 005 se conservan intactas. Precedencia Ăşnica:
        401â†’403â†’422(VALIDATION_ERROR: decision/body)â†’422(INVALID_REASON: motivo)â†’404(no visible pending_review)
        â†’409(EVIDENCE_REQUIRED, sĂłlo approve). Actor server-side. Sin If-Match/409-optimista (=#008). 006 no
        expone lectura del detalle (read-side = #010).
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviewRequest' }
      responses:
        '200':
          description: DecisiĂłn aplicada. Orden actualizada (approveâ†’closed | rejectâ†’in_progress; version+1).
          content:
            application/json: { schema: { $ref: '#/components/schemas/Order' } }
        '401':
          description: No autenticado. Uniforme (001).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '403':
          description: Rol no supervisor (FORBIDDEN_ROLE). Sin efecto.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '404':
          description: >
            Orden inexistente, orderId malformado, o en estado distinto de pending_review (no visible para el
            supervisor). Cuerpo genĂ©rico indistinguible (no-enumeraciĂłn, GUARD_UNMET). Precede a la comprobaciĂłn
            de evidencia.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '409':
          description: >
            AprobaciĂłn sobre una orden visible en pending_review pero SIN evidencia (invariante de 005 rota):
            EVIDENCE_REQUIRED, fail-closed. Sin efecto. SĂłlo aplica a decision=approve.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '422':
          description: >
            decision ausente/fuera de {approve,reject} o body malformado (VALIDATION_ERROR); o motivo invĂˇlido
            (INVALID_REASON: rechazo sin motivo, vacĂ­o tras saneo, o longitud fuera de 1..1000). VALIDATION_ERROR
            se evalĂşa antes que INVALID_REASON. Sin efecto.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '500':
          description: >
            Error interno genĂ©rico NO transitorio (ACTOR_INVALID, constraint inesperada). Cuerpo genĂ©rico; nunca
            filtra detalle de Postgres.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '503':
          description: BD no disponible (fail-closed; nunca cuelga ni fail-open). ConvenciĂłn transversal (001).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access JWT HS256 (igual que 001). No CSRF (no ambiental).

  schemas:
    OrderStatus:
      type: string
      enum: [draft, assigned, in_progress, pending_review, closed]

    Order:
      type: object
      additionalProperties: false
      required: [id, title, description, status, assigned_to, version, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        status: { $ref: '#/components/schemas/OrderStatus' }
        assigned_to:
          oneOf:
            - { type: string, format: uuid, description: UUID opaco del tĂ©cnico (sin nombre/PII) }
            - { type: 'null' }
        version: { type: integer, minimum: 0, description: Concurrencia optimista (sin comportamiento en 002a). }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    OrderListResponse:
      type: object
      additionalProperties: false
      required: [orders]
      properties:
        orders:
          type: array
          items: { $ref: '#/components/schemas/Order' }

    ReassignmentRequest:
      type: object
      additionalProperties: false
      required: [assignee_id, reason]
      description: >
        Cuerpo de la reasignaciĂłn. `assignee_id` = tĂ©cnico destino. `reason` obligatorio (1..500 code points,
        â‰Ą1 carĂˇcter imprimible; nunca aparece en logs ni en cuerpos de error). El actor NO se envĂ­a (se deriva
        del token server-side).
      properties:
        assignee_id: { type: string, format: uuid, description: UUID del tĂ©cnico destino. }
        reason:
          type: string
          minLength: 1
          maxLength: 500
          description: >
            Motivo operativo del reparto. `minLength`/`maxLength` se cuentan en code points Unicode (JSON Schema);
            el Zod derivado debe contar code points (no UTF-16). Debe contener â‰Ą1 carĂˇcter imprimible (no sĂłlo
            whitespace/control). Nunca aparece en logs ni en cuerpos de error.

    EvidenceRef:
      type: object
      additionalProperties: false
      required: [object_ref, content_type, size_bytes]
      description: >
        Referencia/metadato de una evidencia (feature 005). El binario NO viaja aquĂ­ (transporte = #007). Se
        valida por formato, sin comprobar existencia del objeto.
      properties:
        object_ref:
          type: string
          minLength: 1
          maxLength: 512
          description: >
            String opaco (clave de objeto). 1..512 code points; sin caracteres de control ni whitespace de
            borde. No se comprueba existencia. Igualdad exacta para detectar duplicados. Potencial PII: nunca en
            cuerpos de error; en logs sĂłlo id/conteo, no el ref crudo.
        content_type:
          type: string
          enum: [image/jpeg, image/png, image/webp, image/heic]
          description: Allowlist de imĂˇgenes. Fuera de lista â†’ INVALID_EVIDENCE.
        size_bytes:
          type: integer
          minimum: 1
          maximum: 26214400
          description: TamaĂ±o declarado (metadato). 1..26214400 (25 MiB). Fuera de rango â†’ INVALID_EVIDENCE.

    ExecutionRequest:
      type: object
      additionalProperties: false
      required: [notes, evidence]
      description: >
        Cuerpo del registro de ejecuciĂłn. `notes` obligatorias (payload PII: nunca en logs/errores; persistidas
        en OrderExecutionNotes, no en la auditorĂ­a). `evidence` con 1..10 elementos, sin object_ref duplicados.
        El actor NO se envĂ­a (se deriva del token server-side). Sin campo de versiĂłn (concurrencia server-side).
      properties:
        notes:
          type: string
          minLength: 1
          maxLength: 2000
          description: >
            Notas operativas. 1..2000 code points (Zod cuenta code points, no UTF-16); â‰Ą1 carĂˇcter imprimible
            (no sĂłlo whitespace/control). Nunca aparecen en logs ni en cuerpos de error.
        evidence:
          type: array
          minItems: 1
          maxItems: 10
          items: { $ref: '#/components/schemas/EvidenceRef' }
          description: â‰Ą1 y â‰¤10 evidencias; sin object_ref duplicados (igualdad exacta). Bloqueante (Brief "â‰Ą1 foto").

    ReviewRequest:
      type: object
      additionalProperties: false
      required: [decision]
      description: >
        Cuerpo de la decisiĂłn de revisiĂłn (feature 006). `decision` obligatorio (approve|reject). `reason`
        obligatorio en reject, opcional en approve; si se envĂ­a en approve se valida IGUAL. Pre-saneado y
        persistido en OrderAudit.reason; nunca en logs ni en cuerpos de error. El actor NO se envĂ­a (se deriva
        del token server-side).
      properties:
        decision:
          type: string
          enum: [approve, reject]
          description: DecisiĂłn del supervisor. Ausente o fuera del enum â†’ 422 VALIDATION_ERROR.
        reason:
          type: string
          minLength: 1
          maxLength: 1000
          description: >
            Motivo de la decisiĂłn. Obligatorio si `decision=reject`; opcional si `approve`. 1..1000 code points
            (el Zod derivado cuenta code points, no UTF-16); â‰Ą1 carĂˇcter imprimible **tras saneo**
            (`sanitizeReason`: trim + colapso de whitespace interno + strip de control chars Cc `U+0000`â€“`U+001F`
            `U+007F` salvo `\n` + NFC). VacĂ­o tras saneo o fuera de rango â†’ 422 INVALID_REASON. Nunca en
            logs/errores.

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [code, message]
      description: >
        Contrato de error accionable (igual que 001). CĂłdigos: 002a 401/403/503; 004 401/403/404/422/500;
        005 (startOrderWork/submitOrderExecution) 401/403/404/422/500 â€” cĂłdigos de dominio
        EVIDENCE_REQUIRED/INVALID_EVIDENCE/VALIDATION_ERROR (422), GUARD_UNMET (404, no-enumeraciĂłn) e
        INVALID_TRANSITION (422). 006 (reviewOrder) 401/403/404/409/422/500/503 â€” VALIDATION_ERROR (422,
        decision/body), INVALID_REASON (422, motivo), GUARD_UNMET (404, no visible), EVIDENCE_REQUIRED (409,
        guard de evidencia en approve). `agent_action` se emite en las respuestas de **negocio** de los handlers
        de 004/005/006 (404/409/422/500); los 401/403 provienen del middleware reutilizado de 001 y pueden no
        llevarlo (por eso `agent_action` es opcional, no `required`).
      properties:
        code: { type: string }
        message: { type: string, description: EspaĂ±ol; no interpola valores recibidos ni PII. }
        details:
          type: object
          additionalProperties: false
          properties:
            fields: { type: array, items: { type: string } }
        agent_action: { type: string }
