openapi: 3.1.0
info:
  title: FieldOps — Orders API
  version: 1.5.0
  description: >
    Feature 002a (read-side): listado de órdenes filtrado por rol sobre el auth/RBAC de 001.
    Feature 004 (write-side): reasignación de una orden por el dispatcher (POST .../reassignments),
    primer endpoint que muta una orden (conserva estado, version+1, auditoría append-only atómica).
    Feature 005 (write-side): registro de ejecución por el técnico — startOrderWork (POST .../start,
    assigned→in_progress) y submitOrderExecution (POST .../execution, in_progress→pending_review con
    ≥1 evidencia por referencia + notas).
    Feature 006 (write-side): revisión por el supervisor — reviewOrder (POST .../review): approve
    (pending_review→closed, guard ≥1 evidencia → 409) o reject (pending_review→in_progress con motivo).
    Feature 007 (IA, read-only): summarizeOrderIncident (POST .../ai-summary): resumen IA de la incidencia para
    el supervisor (fallback no-inventa, minimización de PII, rate-limit 10/60s, timeout 10s).
    Feature 008/#010 (read-side): getOrderDetail (GET .../{orderId}): detalle de una orden visible según el rol
    (notas+metadatos de evidencia del ciclo vigente para technician/supervisor; motivo del último rechazo SIN
    atender leído de OrderAudit.reason —excepción XI v1.9.0, saneado al leer, fail-closed— solo al técnico dueño).
    404 uniforme (sin 403; la visibilidad filtra a 404, no-enumeración). Observabilidad best-effort de accesos denegados (durable = #009).
    Contract-first (Constitution II). Nombres externos snake_case; internos camelCase.
    Reutiliza bearerAuth y ErrorResponse de contracts/auth.openapi.yaml (001).
servers:
  - url: /v1
tags:
  - name: orders
    description: Órdenes de trabajo (listado + reasignación + registro de ejecución)

paths:
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: Listar las órdenes visibles según el rol del usuario autenticado
      description: >
        Devuelve las órdenes filtradas por la política de alcance del rol (orderScopeFor):
        technician = propias activas (assigned/in_progress/pending_review); supervisor = pending_review;
        dispatcher = assigned/in_progress. `draft` y `closed` nunca aparecen. Orden created_at desc, id desc.
        Sin paginación. Ningún parámetro de consulta amplía el alcance (se ignoran). Orden 401→403.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista (posiblemente vacía) de las órdenes del alcance del rol.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderListResponse' }
        '401':
          description: No autenticado (sin access válido / sesión revocada / cuenta disabled). Uniforme.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '403':
          description: Rol fuera del allowlist de `orders:list` (default-deny, fail-secure).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '503':
          description: BD no disponible (fail-closed; nunca cuelga ni fail-open). Convención transversal (001).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

  /orders/{orderId}:
    get:
      operationId: getOrderDetail
      tags: [orders]
      summary: Detalle de una orden visible según el rol (read-side puro)
      description: >
        Lectura pura del detalle de una orden visible para el rol (mismo alcance que listOrders/orderScopeFor):
        technician = sus órdenes activas (assigned/in_progress/pending_review); supervisor = pending_review;
        dispatcher = assigned/in_progress. `draft`/`closed` fuera de alcance de todo rol → 404.
        Los tres campos de trabajo (`notes`, `evidence`, `last_rejection_reason`) son OPCIONALES y se OMITEN
        (nunca `null`): el dispatcher no recibe `notes`/`evidence` (mínimo privilegio); `last_rejection_reason`
        solo lo ve el technician dueño ACTUAL cuando hay rechazo SIN atender (última transición de rechazo
        posterior al último submit), leído de OrderAudit.reason (excepción XI v1.9.0), saneado al leer con el
        pii-redactor (fail-closed: si el redactor falla, se omite el campo, nunca crudo).
        No-enumeración: 404 genérico e indistinguible para orden inexistente/ajena/fuera-de-estado/`orderId`
        malformado (NO 400) y para rol no reconocido (alcance vacío → 404). NO se usa 403 (un 403 sobre un
        orderId concreto revelaría existencia). Precedencia: 401 (no autenticado) precede a toda resolución de
        visibilidad. Todo acceso denegado (401/404) emite una señal de log best-effort con recurso opaco saneado,
        sin PII (FR-009); el registro forense durable append-only de accesos denegados es la feature #009
        (BL-002/067), fuera del MVP. Read-only: no muta estado/version/notas/auditoría de negocio; no sirve el
        binario de evidencia (eso es #007-subida).
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          description: >
            Identificador de la orden (UUID esperado). Un `orderId` malformado NO produce 400: se resuelve al
            MISMO 404 genérico que una orden no visible (no-enumeración). Se tipa como string (no `format: uuid`)
            para evitar un 400 de validación de esquema que rompería la no-enumeración.
          schema: { type: string }
      responses:
        '200':
          description: Detalle de la orden visible para el rol.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderDetailResponse' }
        '401':
          description: No autenticado (sin access válido / sesión revocada / cuenta disabled). Uniforme. Auditado (XI).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '404':
          description: >
            Orden no visible para el rol (inexistente / ajena / fuera de su alcance de estado / `draft` / `closed`
            / `orderId` malformado / rol no reconocido). Genérico e indistinguible (no-enumeración). Auditado (XI).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '500':
          description: Error inesperado del servidor (no transitorio). Convención transversal (001/006).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '503':
          description: BD no disponible al leer (fail-closed; nunca cuelga ni fail-open). Convención transversal (001).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

  /orders/{orderId}/reassignments:
    post:
      operationId: reassignOrder
      tags: [orders]
      summary: Reasignar una orden reasignable a otro técnico (sólo dispatcher)
      description: >
        Un dispatcher reasigna una orden reasignable (status assigned/in_progress) a un técnico destino válido,
        conservando el status, con version+1 y auditoría append-only en la misma transacción.
        No-enumeración: una única consulta de visibilidad decide 404 (inexistente o no reasignable, cuerpo
        genérico idéntico). Orden 401→403→404→422. Actor derivado server-side del token (nunca del cuerpo).
        MVP sin concurrencia optimista explícita (If-Match/409 = stretch, fuera de alcance).
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReassignmentRequest' }
      responses:
        '200':
          description: Reasignación aplicada. Orden actualizada (nuevo assigned_to, version+1).
          content:
            application/json: { schema: { $ref: '#/components/schemas/Order' } }
        '401':
          description: No autenticado (sin access válido / sesión revocada / cuenta disabled). Uniforme.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '403':
          description: Autenticado pero el rol no es dispatcher (FORBIDDEN_ROLE, default-deny). Sin efecto.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '404':
          description: >
            Orden inexistente, no visible/no reasignable, u orderId malformado (no-uuid). Cuerpo genérico e
            indistinguible entre las causas (no-enumeración).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '422':
          description: >
            INVALID_ASSIGNEE (destino inexistente / no-technician / deshabilitado / igual al actual — cuerpo
            genérico idéntico para las 4 causas) o VALIDATION_ERROR (reason ausente/vacío/sólo whitespace o
            control / >500 code points, o cuerpo mal formado). Sin efecto.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '500':
          description: >
            Error interno genérico. Cubre TODO error de base de datos (deadlock, timeout, BD no disponible,
            constraint), conforme a FR-009. Cuerpo genérico; nunca filtra detalle de Postgres (SQLSTATE,
            constraint, columna, query).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

  # ---- Feature 005 — registro de ejecución por el técnico ----
  /orders/{orderId}/start:
    post:
      operationId: startOrderWork
      tags: [orders]
      summary: Iniciar el trabajo de una orden propia (sólo technician)
      description: >
        Un technician inicia su orden en estado `assigned` (assigned→in_progress), con version+1 y auditoría
        append-only atómica (reason NULL). Sin cuerpo. Precedencia única 401→403→404(pertenencia)→422(estado).
        Actor derivado del token server-side. Pertenencia (assigned_to == actor) antes que estado: orden ajena en
        cualquier estado → 404 genérico. Se aplica vía el módulo write-side propio de 005 (start-order-work.ts +
        classify-execution-guard.ts); NO reutiliza applyTransition/classifyZeroRows de 002b para clasificar.
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Trabajo iniciado. Orden actualizada (status in_progress, version+1).
          content:
            application/json: { schema: { $ref: '#/components/schemas/Order' } }
        '401':
          description: No autenticado. Uniforme (001).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '403':
          description: Autenticado pero el rol no es technician (FORBIDDEN_ROLE, default-deny). Sin efecto.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '404':
          description: >
            Orden inexistente, ajena (assigned_to != actor) u orderId malformado. Cuerpo genérico indistinguible
            (no-enumeración), incluso si la orden ajena está en estado no operable.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '422':
          description: >
            Orden PROPIA pero en estado de origen no legal para iniciar (ya in_progress/pending_review/closed):
            INVALID_TRANSITION. Sin efecto.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '500':
          description: Error interno genérico (todo error de BD). Cuerpo genérico; nunca filtra detalle de Postgres.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

  /orders/{orderId}/execution:
    post:
      operationId: submitOrderExecution
      tags: [orders]
      summary: Registrar la ejecución con evidencia y notas (sólo technician)
      description: >
        Un technician registra la ejecución de su orden en estado `in_progress` (in_progress→pending_review),
        adjuntando ≥1 evidencia válida (por referencia) y notas. En UNA sola transacción: transición, version+1,
        auditoría (reason = marcador opaco, sin las notas), evidencia(s) append-only y notas en tabla aparte
        (OrderExecutionNotes, payload PII). Todo o nada, en orden transición→auditoría→evidencia→notas.
        Precedencia única PAYLOAD PRIMERO: 401→403→422(payload)→404(pertenencia)→422(estado); dentro del payload,
        evidencia antes que notas. Orden ajena con payload válido → 404; con payload inválido → 422 (el 422 de
        payload no es correlacionable con el recurso destino). Actor server-side. Sin If-Match/409 (=#008).
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExecutionRequest' }
      responses:
        '200':
          description: Ejecución registrada. Orden actualizada (status pending_review, version+1).
          content:
            application/json: { schema: { $ref: '#/components/schemas/Order' } }
        '401':
          description: No autenticado. Uniforme (001).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '403':
          description: Rol no technician (FORBIDDEN_ROLE). Sin efecto.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '404':
          description: >
            Orden inexistente, ajena u orderId malformado. Cuerpo genérico indistinguible (no-enumeración),
            incluso si la orden ajena está en estado no operable.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '422':
          description: >
            Orden propia en estado no legal (INVALID_TRANSITION); o evidencia inválida: EVIDENCE_REQUIRED
            (0 elementos) / INVALID_EVIDENCE (content_type fuera de allowlist, size_bytes fuera de rango,
            object_ref con formato inválido, duplicados, o array > máximo); o notas inválidas (VALIDATION_ERROR:
            ausentes/vacías/whitespace/>máx). La evidencia se valida antes que las notas. Sin efecto.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '500':
          description: Error interno genérico (todo error de BD). Cuerpo genérico; nunca filtra detalle de Postgres.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

  /orders/{orderId}/review:
    post:
      operationId: reviewOrder
      tags: [orders]
      summary: Aprobar o rechazar una orden en pending_review (sólo supervisor)
      description: >
        Un supervisor decide sobre una orden en `pending_review`: approve (pending_review→closed) o reject
        (pending_review→in_progress con motivo obligatorio). En UNA transacción: transición, version+1 y
        auditoría append-only (OrderAudit.reason = motivo pre-saneado, nunca en logs/errores). La aprobación
        aplica un guard defensivo: la orden debe conservar ≥1 evidencia (invariante de 005) o 409
        EVIDENCE_MISSING. Evidencia y notas de 005 se conservan intactas. Precedencia única:
        401→403→422(VALIDATION_ERROR: decision/body)→422(INVALID_REASON: motivo)→404(no visible pending_review)
        →409(EVIDENCE_MISSING, sólo approve). Actor server-side. Sin If-Match/409-optimista (=#008). 006 no
        expone lectura del detalle (read-side = #010).
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviewRequest' }
      responses:
        '200':
          description: Decisión aplicada. Orden actualizada (approve→closed | reject→in_progress; version+1).
          content:
            application/json: { schema: { $ref: '#/components/schemas/Order' } }
        '401':
          description: No autenticado. Uniforme (001).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '403':
          description: Rol no supervisor (FORBIDDEN_ROLE). Sin efecto.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '404':
          description: >
            Orden inexistente, orderId malformado, o en estado distinto de pending_review (no visible para el
            supervisor). Cuerpo genérico indistinguible (no-enumeración, GUARD_UNMET). Precede a la comprobación
            de evidencia.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '409':
          description: >
            Aprobación sobre una orden visible en pending_review pero SIN evidencia (invariante de 005 rota):
            EVIDENCE_MISSING, fail-closed. Sin efecto. Sólo aplica a decision=approve.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '422':
          description: >
            decision ausente/fuera de {approve,reject} o body malformado (VALIDATION_ERROR); o motivo inválido
            (INVALID_REASON: rechazo sin motivo, vacío tras saneo, o longitud fuera de 1..1000). VALIDATION_ERROR
            se evalúa antes que INVALID_REASON. Sin efecto.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '500':
          description: >
            Error interno genérico NO transitorio (ACTOR_INVALID, constraint inesperada). Cuerpo genérico; nunca
            filtra detalle de Postgres.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '503':
          description: BD no disponible (fail-closed; nunca cuelga ni fail-open). Convención transversal (001).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

  /orders/{orderId}/ai-summary:
    post:
      operationId: summarizeOrderIncident
      tags: [orders]
      summary: Resumen IA de la incidencia de una orden en pending_review (sólo supervisor)
      description: >
        Feature 007. Un supervisor obtiene un resumen en lenguaje natural de la incidencia (notas de ejecución +
        metadatos de evidencia de 005) para apoyar la revisión (006). La IA nunca inventa (fallback
        sufficient=false) ni filtra PII (minimización por capas antes del proveedor + chequeo de salida;
        Constitution VIII). Proveedor por CLI (claude -p) en dev, mock en tests; timeout duro 10 s. Rate-limit
        10/60 s por usuario. Precedencia 401→403→429→404→proveedor(503 timeout/fallo | 200 resumen/fallback). El
        prompt/resumen no se persisten ni se loguean; se emite un evento de acceso sin PII (server-side).
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: >
            Resultado del resumen. `sufficient=true` → `summary` con el texto (≤1200); `sufficient=false` →
            `summary=null` (fallback: evidencia insuficiente, salida no conforme, o PII detectada — la causa NO
            se revela al cliente).
          content:
            application/json: { schema: { $ref: '#/components/schemas/IncidentSummaryResponse' } }
        '401':
          description: No autenticado. Uniforme (001).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '403':
          description: Rol no supervisor (FORBIDDEN_ROLE). Sin llamar al proveedor.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '404':
          description: >
            Orden inexistente, orderId malformado, o en estado ≠ pending_review (no visible). Cuerpo genérico
            (no-enumeración). Sin llamar al proveedor.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '429':
          description: Rate-limit por usuario superado (10/60 s). RATE_LIMITED + Retry-After. Sin llamar al proveedor.
          headers:
            Retry-After:
              description: Segundos hasta que expira la ventana de rate-limit (coherente con 001).
              schema: { type: integer }
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '500':
          description: >
            Error interno genérico (INTERNAL). Cubre cualquier fallo inesperado; cuerpo genérico, nunca filtra
            detalle de Postgres/proveedor. (Un fallo de conexión/indisponibilidad de BD NO es 500: es 503,
            convención transversal 001/006.)
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '501':
          description: >
            AI_UNAVAILABLE (018): el proveedor IA **no es operable en este entorno** (dev-only) — binario
            ausente/no ejecutable en el despliegue, o guard dev-only en pre/prod. **No reintentable** (distinto
            del 503 transitorio). Cuerpo genérico (sin nombre de binario/ruta/versión/traza). Sólo puede surgir
            tras 401/403/429/404 y el gate de material (el front distingue por `code:AI_UNAVAILABLE`).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '503':
          description: >
            No disponible (SERVICE_UNAVAILABLE): timeout (>10 s) o fallo de proceso del proveedor IA, **o** BD no
            disponible al leer la fuente (convención 001/006). Cuerpo genérico; nunca filtra detalle. (Una salida
            vacía/no-conforme/con-PII NO es 503: es 200 fallback.)
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access JWT HS256 (igual que 001). No CSRF (no ambiental).

  schemas:
    OrderStatus:
      type: string
      enum: [draft, assigned, in_progress, pending_review, closed]

    Order:
      type: object
      additionalProperties: false
      required: [id, title, description, status, assigned_to, version, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        status: { $ref: '#/components/schemas/OrderStatus' }
        assigned_to:
          oneOf:
            - { type: string, format: uuid, description: UUID opaco del técnico (sin nombre/PII) }
            - { type: 'null' }
        version: { type: integer, minimum: 0, description: Concurrencia optimista (sin comportamiento en 002a). }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    OrderListResponse:
      type: object
      additionalProperties: false
      required: [orders]
      properties:
        orders:
          type: array
          items: { $ref: '#/components/schemas/Order' }

    EvidenceMeta:
      type: object
      additionalProperties: false
      required: [count, content_types]
      description: >
        Metadatos (NO binario) de la evidencia del ciclo vigente (feature 008/#010). `count` = nº de evidencias
        del ciclo; `content_types` = lista de `content_type` por evidencia (duplicados posibles), ORDENADA por
        `at` ascendente de cada OrderEvidence (desempate por `id`). Invariante: `count == content_types.length`.
        Sin ciclo de ejecución aún (p. ej. `assigned` sin submit) → `{count:0, content_types:[]}`; un ciclo ya
        enviado siempre tiene ≥1 evidencia (005 exige 1..10). NUNCA incluye `object_ref` ni el binario.
      properties:
        count:
          type: integer
          minimum: 0
          description: Número de evidencias del ciclo vigente (0 solo si aún no hay submit).
        content_types:
          type: array
          items:
            type: string
            enum: [image/jpeg, image/png, image/webp, image/heic]
          description: Un content_type por evidencia (duplicados posibles), ordenado por `at` asc. length == count.

    OrderDetailResponse:
      type: object
      additionalProperties: false
      required: [order]
      description: >
        Detalle de una orden (feature 008/#010). `order` siempre presente. `notes`, `evidence` y
        `last_rejection_reason` son OPCIONALES y se OMITEN (nunca `null`) cuando no aplican al rol/estado:
        el dispatcher no recibe `notes`/`evidence` (mínimo privilegio); `last_rejection_reason` solo lo ve el
        technician dueño ACTUAL con rechazo SIN atender (saneado al leer, fail-closed). Sin PII cruda ni object_ref.
      properties:
        order: { $ref: '#/components/schemas/Order' }
        notes:
          type: string
          description: >
            Notas de ejecución del ciclo vigente (payload IX). Solo technician dueño/supervisor; omitido para el
            dispatcher y cuando no hay ciclo. Nunca en logs/errores. NO pasa por el pii-redactor (payload autoría).
        evidence:
          allOf:
            - { $ref: '#/components/schemas/EvidenceMeta' }
          description: >
            Metadatos de evidencia del ciclo vigente. Solo technician dueño/supervisor; OMITIDO para el dispatcher.
            Presente-pero-vacío `{count:0, content_types:[]}` cuando no hay ciclo aún.
        last_rejection_reason:
          type: string
          description: >
            Motivo del último rechazo SIN atender, leído de OrderAudit.reason (excepción XI v1.9.0) y SANEADO al
            leer (pii-redactor). Solo el technician dueño ACTUAL; omitido para el resto y cuando no hay rechazo sin
            atender. Fail-closed: si el redactor falla, la clave se OMITE (nunca el motivo crudo).

    ReassignmentRequest:
      type: object
      additionalProperties: false
      required: [assignee_id, reason]
      description: >
        Cuerpo de la reasignación. `assignee_id` = técnico destino. `reason` obligatorio (1..500 code points,
        ≥1 carácter imprimible; nunca aparece en logs ni en cuerpos de error). El actor NO se envía (se deriva
        del token server-side).
      properties:
        assignee_id: { type: string, format: uuid, description: UUID del técnico destino. }
        reason:
          type: string
          minLength: 1
          maxLength: 500
          description: >
            Motivo operativo del reparto. `minLength`/`maxLength` se cuentan en code points Unicode (JSON Schema);
            el Zod derivado debe contar code points (no UTF-16). Debe contener ≥1 carácter imprimible (no sólo
            whitespace/control). Nunca aparece en logs ni en cuerpos de error.

    EvidenceRef:
      type: object
      additionalProperties: false
      required: [object_ref, content_type, size_bytes]
      description: >
        Referencia/metadato de una evidencia (feature 005). El binario NO viaja aquí (transporte = #007). Se
        valida por formato, sin comprobar existencia del objeto.
      properties:
        object_ref:
          type: string
          minLength: 1
          maxLength: 512
          description: >
            String opaco (clave de objeto). 1..512 code points; sin caracteres de control ni whitespace de
            borde. No se comprueba existencia. Igualdad exacta para detectar duplicados. Potencial PII: nunca en
            cuerpos de error; en logs sólo id/conteo, no el ref crudo.
        content_type:
          type: string
          enum: [image/jpeg, image/png, image/webp, image/heic]
          description: Allowlist de imágenes. Fuera de lista → INVALID_EVIDENCE.
        size_bytes:
          type: integer
          minimum: 1
          maximum: 26214400
          description: Tamaño declarado (metadato). 1..26214400 (25 MiB). Fuera de rango → INVALID_EVIDENCE.

    ExecutionRequest:
      type: object
      additionalProperties: false
      required: [notes, evidence]
      description: >
        Cuerpo del registro de ejecución. `notes` obligatorias (payload PII: nunca en logs/errores; persistidas
        en OrderExecutionNotes, no en la auditoría). `evidence` con 1..10 elementos, sin object_ref duplicados.
        El actor NO se envía (se deriva del token server-side). Sin campo de versión (concurrencia server-side).
      properties:
        notes:
          type: string
          minLength: 1
          maxLength: 2000
          description: >
            Notas operativas. 1..2000 code points (Zod cuenta code points, no UTF-16); ≥1 carácter imprimible
            (no sólo whitespace/control). Nunca aparecen en logs ni en cuerpos de error.
        evidence:
          type: array
          minItems: 1
          maxItems: 10
          items: { $ref: '#/components/schemas/EvidenceRef' }
          description: ≥1 y ≤10 evidencias; sin object_ref duplicados (igualdad exacta). Bloqueante (Brief "≥1 foto").

    IncidentSummaryResponse:
      type: object
      additionalProperties: false
      required: [summary, sufficient]
      description: >
        Resultado del resumen IA (feature 007). `sufficient=true` → `summary` es el texto (≤1200 code points);
        `sufficient=false` → `summary` es `null` (fallback: no inventa). El cliente distingue por `sufficient`,
        sin heurística de texto. La causa del fallback (insuficiente / no-conforme / PII) NO se expone.
      properties:
        summary:
          oneOf:
            - type: string
              maxLength: 1200
              description: Resumen en lenguaje natural (español) sin PII.
            - type: 'null'
        sufficient:
          type: boolean
          description: true si el proveedor pudo resumir con fidelidad; false implica fallback (summary null).

    ReviewRequest:
      type: object
      additionalProperties: false
      required: [decision]
      description: >
        Cuerpo de la decisión de revisión (feature 006). `decision` obligatorio (approve|reject). `reason`
        obligatorio en reject, opcional en approve; si se envía en approve se valida IGUAL. Pre-saneado y
        persistido en OrderAudit.reason; nunca en logs ni en cuerpos de error. El actor NO se envía (se deriva
        del token server-side).
      properties:
        decision:
          type: string
          enum: [approve, reject]
          description: Decisión del supervisor. Ausente o fuera del enum → 422 VALIDATION_ERROR.
        reason:
          type: string
          minLength: 1
          maxLength: 4000
          description: >
            Motivo de la decisión. Obligatorio si `decision=reject`; opcional si `approve`. El `maxLength: 4000`
            es una **cota cruda de seguridad de payload** (evita cuerpos absurdos → 422 VALIDATION_ERROR). La
            **longitud efectiva 1..1000 code points se mide en el DOMINIO TRAS `sanitizeReason`** (trim + colapso
            de whitespace interno + strip de control chars Cc `U+0000`–`U+001F` `U+007F` salvo `\n` + NFC);
            vacío tras saneo o >1000 tras saneo → 422 **INVALID_REASON** (no VALIDATION_ERROR). Un motivo con
            mucho whitespace puede superar 1000 en crudo y ser válido tras saneo — por eso la cota del schema NO
            es 1000. Nunca en logs/errores.

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [code, message]
      description: >
        Contrato de error accionable (igual que 001). Códigos: 002a 401/403/503; 004 401/403/404/422/500;
        005 (startOrderWork/submitOrderExecution) 401/403/404/422/500 — códigos de dominio
        EVIDENCE_REQUIRED/INVALID_EVIDENCE/VALIDATION_ERROR (422), GUARD_UNMET (404, no-enumeración) e
        INVALID_TRANSITION (422). 006 (reviewOrder) 401/403/404/409/422/500/503 — VALIDATION_ERROR (422,
        decision/body), INVALID_REASON (422, motivo), GUARD_UNMET (404, no visible), EVIDENCE_MISSING (409,
        guard de evidencia en approve). 007 (summarizeOrderIncident) 401/403/404/429/500/503 — FORBIDDEN_ROLE (403),
        404 genérico (no-enumeración, orden no visible/estado ≠ pending_review), RATE_LIMITED (429, con header
        Retry-After), INTERNAL (500, error inesperado), SERVICE_UNAVAILABLE (503, timeout/fallo del proveedor **o**
        BD no disponible al leer la fuente, convención 001/006). `agent_action` se emite en las
        respuestas de **negocio** de los handlers de 004/005/006 (404/409/422/500); los 401/403 provienen del
        middleware reutilizado de 001 y pueden no llevarlo (por eso `agent_action` es opcional, no `required`).
      properties:
        code: { type: string }
        message: { type: string, description: Español; no interpola valores recibidos ni PII. }
        details:
          type: object
          additionalProperties: false
          properties:
            fields: { type: array, items: { type: string } }
        agent_action: { type: string }
