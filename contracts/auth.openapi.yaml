openapi: 3.1.0
info:
  title: FieldOps — Auth / Session / RBAC API
  version: 1.0.0
  description: >
    Fundación de identidad de FieldOps (feature 001): autenticación, ciclo de sesión y RBAC.
    Contract-first (Constitution II). Nombres externos snake_case; internos camelCase.
    Access = JWT corto en el cuerpo (Bearer, en memoria del cliente).
    Refresh = opaco en cookie HttpOnly/Secure/SameSite=Strict (revocable, single-use con rotación).
    CSRF double-submit (X-CSRF-Token == cookie csrf_token) solo en endpoints de cookie (refresh/logout);
    orden de comprobación: sesión (401) antes que CSRF (403) — FR-018.
servers:
  - url: /v1
    description: API versionada (auth). /health y /ready se sirven fuera de /v1.
tags:
  - name: auth
    description: Autenticación, sesión y RBAC
  - name: ops
    description: Observabilidad / salud

paths:
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Autenticar por identifier (email o username) + contraseña
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Sesión creada. Access en el cuerpo; refresh y csrf_token en cookies.
          headers:
            Set-Cookie:
              description: >
                refresh_token (HttpOnly, Secure, SameSite=Strict, Path=/v1/auth) y
                csrf_token (Secure, SameSite=Strict, legible por JS para double-submit).
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '401':
          description: Credenciales inválidas (mensaje uniforme, no revela existencia).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '422':
          description: Cuerpo mal formado (validación Zod del contrato).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '429':
          description: >
            Umbral de lockout superado (5 intentos/15 min) — uniforme para cuenta bloqueada e
            identifier inexistente (anti-enumeración).
          headers:
            Retry-After:
              description: Segundos hasta que expira el bloqueo (ventana fija).
              schema: { type: integer }
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

  /auth/refresh:
    post:
      operationId: refresh
      tags: [auth]
      summary: Rotar el refresh (single-use) y emitir un nuevo access token
      description: >
        Usa la cookie refresh_token. Requiere CSRF double-submit. Rota el refresh (single-use, atómica);
        reintento del mismo token dentro de la ventana de gracia (≤10 s) devuelve el mismo par ya emitido;
        reuso fuera de gracia revoca la familia. Al rotar, relee el rol de BD (FR-004).
      security:
        - refreshCookie: []
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: Nuevo access token; refresh y csrf_token rotados (nuevas cookies).
          headers:
            Set-Cookie:
              description: Reemite AMBAS cookies — refresh_token rotado (single-use) y csrf_token rotado.
              schema: { type: string }
          content:
            application/json: { schema: { $ref: '#/components/schemas/LoginResponse' } }
        '401':
          description: >
            Refresh caducado/revocado/reuso detectado (familia revocada), o cuenta disabled. Sin cookie de
            sesión válida = 401, comprobado ANTES que el CSRF (FR-018).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '403':
          description: Sesión válida pero la validación CSRF (double-submit) falla o falta la cabecera.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Cerrar la sesión actual (revoca solo su refresh)
      description: >
        Revoca únicamente el refresh de la sesión actual (las demás siguen vigentes). Requiere CSRF.
        NO idempotente a nivel de token: un 2º logout con la misma cookie ya revocada → 401 (FR-018).
        El access vigente expira por su TTL corto (invalidación inmediata en logout = stretch, FR-003).
      security:
        - refreshCookie: []
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: Sesión revocada. Limpia las cookies (refresh_token y csrf_token, Max-Age=0).
          headers:
            Set-Cookie:
              description: refresh_token y csrf_token expiradas (Max-Age=0).
              schema: { type: string }
        '401':
          description: Sin cookie de sesión válida (ausente/caducada/ya revocada). Comprobado antes del CSRF.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '403':
          description: Sesión válida pero la validación CSRF falla o falta la cabecera.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

  /auth/me:
    get:
      operationId: me
      tags: [auth]
      summary: Identidad y rol del usuario actual
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Identidad del usuario autenticado.
          content:
            application/json: { schema: { $ref: '#/components/schemas/MeResponse' } }
        '401':
          description: Sin access token válido, o sesión revocada/cuenta disabled.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

  /rbac/probe/{id}:
    get:
      operationId: rbacProbe
      tags: [auth]
      summary: Recurso protegido de ejemplo para verificar RBAC (401/403/404)
      description: >
        Doble de prueba del middleware RBAC (no es dominio real; Order llega en 002). Regla determinista
        (FR-017/017b), orden rol→pertenencia:
        - technician → 403 SIEMPRE (rol que nunca puede esta acción, sin consultar la instancia).
        - dispatcher | supervisor → 200 si el id ∈ conjunto semilla en alcance; 404 si no existe o está
          fuera de alcance (no revela existencia).
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: El rol puede la acción y el recurso está en su alcance.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ProbeResponse' } }
        '401':
          description: No autenticado.
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '403':
          description: El rol nunca puede esta acción (evaluado antes que la pertenencia — FR-017).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }
        '404':
          description: Recurso fuera del alcance/propiedad o inexistente (no revela existencia).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

  /health:
    servers: [{ url: / }]
    get:
      operationId: health
      tags: [ops]
      summary: Liveness (proceso vivo)
      security: []
      responses:
        '200':
          description: Vivo.
          content:
            application/json: { schema: { $ref: '#/components/schemas/HealthResponse' } }

  /ready:
    servers: [{ url: / }]
    get:
      operationId: ready
      tags: [ops]
      summary: Readiness (dependencias listas, p. ej. BD)
      security: []
      responses:
        '200':
          description: Listo (dependencias OK).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ReadyResponse' } }
        '503':
          description: No listo (alguna dependencia no disponible; también fail-closed de la validación).
          content:
            application/json: { schema: { $ref: '#/components/schemas/ReadyResponse' } }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access JWT HS256 en Authorization. No CSRF (no ambiental).
    refreshCookie:
      type: apiKey
      in: cookie
      name: refresh_token
      description: Refresh opaco HttpOnly/Secure/SameSite=Strict. Protegido por CSRF double-submit.

  parameters:
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: false
      description: >
        Debe coincidir con la cookie csrf_token (double-submit). NO se marca `required` a propósito: su
        ausencia la valida el middleware CSRF (→ 403 tras confirmar sesión), no la validación de esquema
        (evitaría un 400 que enmascararía el camino CSRF).
      schema: { type: string }

  schemas:
    Role:
      type: string
      enum: [dispatcher, technician, supervisor]
      description: Rol del sistema (enum cerrado).

    LoginRequest:
      type: object
      additionalProperties: false
      required: [identifier, password]
      properties:
        identifier:
          type: string
          minLength: 1
          maxLength: 320
          description: Email o username (espacio de unicidad global; normalizado minúsculas+trim).
        password:
          type: string
          minLength: 12
          maxLength: 200

    LoginResponse:
      type: object
      additionalProperties: false
      required: [access_token, token_type, expires_in, user]
      properties:
        access_token:
          type: string
          description: JWT de vida corta. El cliente lo guarda en memoria (no localStorage).
        token_type: { type: string, const: Bearer }
        expires_in: { type: integer, description: Segundos de validez del access (p. ej. 900). }
        user: { $ref: '#/components/schemas/UserIdentity' }

    MeResponse:
      type: object
      additionalProperties: false
      required: [user]
      properties:
        user: { $ref: '#/components/schemas/UserIdentity' }

    UserIdentity:
      type: object
      additionalProperties: false
      required: [id, email, username, role]
      properties:
        id: { type: string, format: uuid, description: UUID v7 }
        email: { type: string, format: email }
        username: { type: string }
        role: { $ref: '#/components/schemas/Role' }

    ProbeResponse:
      type: object
      additionalProperties: false
      required: [id, ok]
      properties:
        id: { type: string, format: uuid }
        ok: { type: boolean, const: true }

    HealthResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status: { type: string, const: ok }

    ReadyResponse:
      type: object
      additionalProperties: false
      required: [status, checks]
      properties:
        status: { type: string, enum: [ready, not_ready] }
        checks:
          type: object
          additionalProperties: { type: string, enum: [up, down] }
          description: Estado por dependencia (p. ej. { database up }).

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [code, message]
      description: >
        Contrato de error accionable (Constitution X). 'code' estable en inglés; 'message' en español.
        Códigos usados en 001: 401/403/404/422/429/503 (400/409 llegan con el dominio en 002).
      properties:
        code:
          type: string
          description: Código estable machine-readable (p. ej. INVALID_CREDENTIALS, FORBIDDEN, NOT_FOUND, CSRF_INVALID).
        message:
          type: string
          description: >
            Mensaje para el usuario (español). **No interpola valores recibidos**: nunca incluye
            `password`, tokens/secretos ni el `identifier`/email/username (S-001/FR-014). P. ej. nada de
            "identifier 'x@y.com' inválido".
        details:
          type: object
          additionalProperties: false
          description: >
            Detalles opcionales con **allowlist** de claves (additionalProperties:false; p. ej. `fields`
            con los nombres de campo inválidos de un 422, NUNCA sus valores). Restricciones anti-fuga
            (contract test de contenido): **nunca** contiene `password`, tokens/secretos ni el
            identifier/email/username; en autenticación (login/refresh 401/429) NO distingue "cuenta
            inexistente" de "credenciales inválidas"; en 403/404 (rbacProbe y dominio 002+) NO revela
            propiedad/alcance (ownerId, motivo de fuera-de-alcance).
          properties:
            fields:
              type: array
              items: { type: string }
              description: Nombres de campos inválidos (solo nombres, sin valores) — p. ej. en un 422.
        agent_action:
          type: string
          description: Pista accionable opcional para un agente/cliente.
